baseURL = 'https://nateramos.com/'
title = 'Nate Ramos'
locale = 'en-us'

[module]
  [[module.imports]]
    path = "github.com/hugo-sid/hugo-blog-awesome"

[taxonomies]
  category = "categories"
  tag = "tags"
  series = "series"

[markup]
  [markup.highlight]
    noClasses = false
  [markup.goldmark.renderer]
    unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
    ordered = false

[[menu.main]]
  pageRef = "/"
  name = "Home"
  url = "/"
  weight = 10

[[menu.main]]
  pageRef = "posts"
  name = "Posts"
  url = "/posts/"
  weight = 20

[[menu.main]]
  pageRef = "projects"
  name = "Projects"
  url = "/projects/"
  weight = 30

[[menu.main]]
  pageRef = "about"
  name = "About"
  url = "/about/"
  weight = 40

[params]
  sitename = "Nate Ramos"
  description = "Nate Ramos's personal blog"
  mainSections = ["posts"]
  defaultColor = "auto"
  toc = true
  tocOpen = false
  goToTop = true
  rssFeedDescription = "summary"

[params.author]
  name = "Nate Ramos"
  email = ""

[[params.socialIcons]]
name = "github"
url = "https://github.com/KnobleChipmunk"

[[params.socialIcons]]
name = "rss"
url = "/index.xml"
